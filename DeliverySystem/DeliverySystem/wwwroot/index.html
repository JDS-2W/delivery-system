<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anallu Pizzaria | Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #dc2626;
            --dark: #111827;
            --accent: #f59e0b;
            --bg-color: #f3f4f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--dark);
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        .font-oswald {
            font-family: 'Oswald', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .glass-nav {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary);
        }

        .card-pizza {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border: 1px solid #e5e7eb;
        }

            .card-pizza:active {
                transform: scale(0.98);
            }

        .btn-pizza {
            background-color: var(--primary);
            color: white;
            border-radius: 1rem;
            font-weight: 800;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
        }

            .btn-pizza:active {
                transform: scale(0.95);
                background-color: #b91c1c;
            }

        .modal-overlay {
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 60;
        }

            .modal-overlay.open {
                opacity: 1;
                pointer-events: auto;
            }
    </style>
</head>
<body class="pb-32">

    <audio id="somEstoqueBaixo" src="https://www.myinstants.com/media/sounds/erro.mp3" preload="auto"></audio>

    <div class="relative h-72 w-full bg-gray-900 overflow-hidden shadow-lg">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1000" class="w-full h-full object-cover opacity-50">
        <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/60 to-transparent"></div>
        <button onclick="abrirModalAdmin()" class="absolute top-4 right-4 bg-black/40 backdrop-blur-md border border-white/20 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest z-20 hover:bg-black/60 transition-colors">Acesso Restrito <i data-lucide="lock" class="w-3 h-3 inline ml-1"></i></button>
        <div class="absolute bottom-6 left-0 w-full text-center z-20 px-4">
            <h1 class="text-5xl font-oswald font-bold text-white uppercase tracking-tight mb-1">Anallu <span class="text-[#dc2626]">Pizzaria</span></h1>
            <p class="text-xs text-gray-300 font-medium flex items-center justify-center gap-1.5 mb-3"><i data-lucide="map-pin" class="w-3.5 h-3.5 text-red-500"></i> R. João Pessoa, 237 - Gameleira</p>
            <div id="nav-subtitle"><span class="bg-red-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 w-max mx-auto"><span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Delivery Ativo</span></div>
        </div>
    </div>

    <div class="sticky top-0 z-30 glass-nav py-4">
        <div id="menu-categorias" class="max-w-xl mx-auto px-4 flex gap-3 overflow-x-auto no-scrollbar whitespace-nowrap"></div>
    </div>

    <main class="max-w-xl mx-auto px-4 mt-8" id="vitrine-categorias">
        <div class="text-center py-20 text-gray-500 font-bold animate-pulse flex flex-col items-center"><i data-lucide="flame" class="w-10 h-10 text-red-500 mb-3"></i> Aquecendo o forno...</div>
    </main>

    <button onclick="toggleCarrinho()" id="btn-carrinho" class="fixed bottom-6 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:max-w-md bg-red-600 hover:bg-red-700 text-white p-4 rounded-2xl shadow-[0_10px_25px_rgba(220,38,38,0.4)] z-40 flex items-center justify-between opacity-0 pointer-events-none translate-y-10 transition-all border-b-4 border-red-800 cursor-pointer">
        <div class="flex items-center gap-4">
            <div class="bg-white text-red-600 w-10 h-10 rounded-xl flex items-center justify-center font-black text-xl shadow-inner" id="cart-badge">0</div>
            <span class="font-black text-xs tracking-wider uppercase">Ver Pedido</span>
        </div>
        <span id="floating-total" class="font-oswald text-2xl tracking-wide">R$ 0,00</span>
    </button>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-gray-50 shadow-2xl z-50 flex flex-col transform translate-x-full transition-transform duration-300">
        <div class="p-6 bg-gray-900 text-white flex justify-between items-center shadow-md z-10">
            <h2 class="text-2xl font-oswald font-bold uppercase tracking-wide flex items-center gap-2"><i data-lucide="shopping-bag" class="text-red-500"></i> Seu Pedido</h2>
            <button onclick="toggleCarrinho()" class="bg-white/10 hover:bg-white/20 p-2.5 rounded-xl transition-colors cursor-pointer"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto p-5 space-y-3"></div>
        <div class="p-6 bg-white border-t border-gray-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between items-end mb-5">
                <span class="text-gray-500 font-black uppercase text-[10px] tracking-widest">Total a Pagar</span>
                <span id="cart-total" class="text-4xl font-oswald font-bold text-red-600">R$ 0,00</span>
            </div>
            <button onclick="abrirCheckout()" class="w-full btn-pizza py-4 text-lg shadow-lg flex justify-center items-center gap-2 cursor-pointer">Confirmar Pedido <i data-lucide="arrow-right" class="w-5 h-5"></i></button>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 modal-overlay flex items-end md:items-center justify-center sm:p-4">
        <div class="bg-white rounded-t-[2.5rem] sm:rounded-3xl shadow-2xl w-full max-w-md p-8 relative max-h-[90vh] flex flex-col">
            <button onclick="fecharCheckout()" class="absolute top-6 right-6 text-gray-400 bg-gray-100 rounded-full p-2 cursor-pointer"><i data-lucide="x" class="w-5 h-5"></i></button>
            <h2 class="text-3xl font-oswald font-bold text-gray-900 mb-2 uppercase">Dados da Entrega</h2>
            <p class="text-xs text-gray-500 font-medium mb-6">Falta pouco para saborear sua Anallu Pizza!</p>

            <div class="overflow-y-auto no-scrollbar flex-grow pb-2">
                <form id="formCheckout" class="space-y-3">
                    <input type="text" id="cliNome" required placeholder="Seu Nome Completo" class="w-full bg-gray-50 p-4 rounded-xl text-sm font-bold border border-gray-200 focus:border-red-500 outline-none transition-colors">
                    <input type="tel" id="cliFone" required placeholder="WhatsApp (DDD + Número)" class="w-full bg-gray-50 p-4 rounded-xl text-sm font-bold border border-gray-200 focus:border-red-500 outline-none transition-colors">

                    <div id="delivery-fields">
                        <textarea id="cliEnd" required rows="2" placeholder="Endereço Completo (Rua, Nº, Bairro, Referência)" class="w-full bg-gray-50 p-4 rounded-xl text-sm font-bold border border-gray-200 focus:border-red-500 outline-none resize-none transition-colors"></textarea>
                    </div>

                    <div id="mesa-fields" class="hidden bg-gray-900 text-white p-6 rounded-2xl text-center shadow-inner border-2 border-red-600">
                        <p class="text-[10px] font-black uppercase tracking-widest text-red-400 mb-1 flex items-center justify-center gap-1"><i data-lucide="utensils" class="w-3 h-3"></i> Consumo no Local</p>
                        <h3 class="text-4xl font-oswald font-bold text-white" id="mesa-numero-display">Mesa --</h3>
                    </div>

                    <textarea id="cliObs" rows="2" placeholder="Alguma observação? (Ex: Tirar cebola, Troco para R$50)" class="w-full bg-yellow-50/50 p-4 rounded-xl text-sm font-bold border border-yellow-200 focus:border-yellow-400 outline-none resize-none transition-colors placeholder-yellow-600/60"></textarea>

                    <button type="submit" class="w-full btn-pizza py-4 text-lg shadow-lg mt-4 flex justify-center items-center gap-2 cursor-pointer"><i data-lucide="flame" class="w-5 h-5"></i> Mandar pro Forno</button>
                </form>
            </div>
        </div>
    </div>

    <div id="admin-auth-modal" class="fixed inset-0 z-[70] modal-overlay flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center relative overflow-hidden border-t-8 border-red-600">
            <button onclick="fecharModalAdmin()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 bg-gray-100 rounded-full p-2 transition-colors cursor-pointer"><i data-lucide="x" class="w-4 h-4"></i></button>
            <div class="w-16 h-16 bg-gray-900 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-md"><i data-lucide="shield-check" class="w-8 h-8"></i></div>
            <h2 class="text-2xl font-oswald font-bold text-gray-900 mb-1 uppercase">Painel Gestor</h2>
            <p class="text-xs text-gray-500 font-medium mb-6">Acesso restrito à equipe Anallu.</p>
            <form id="formAuthAdmin" class="space-y-4">
                <div class="relative"><i data-lucide="user" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i><input type="text" id="auth-user" placeholder="Usuário" required class="w-full bg-gray-50 border border-gray-200 py-4 pl-12 pr-4 rounded-xl text-sm font-bold outline-none focus:border-red-500 transition-colors"></div>
                <div class="relative"><i data-lucide="lock" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i><input type="password" id="auth-pass" placeholder="Senha" required class="w-full bg-gray-50 border border-gray-200 py-4 pl-12 pr-4 rounded-xl text-sm font-bold outline-none focus:border-red-500 transition-colors"></div>
                <button type="submit" class="w-full btn-pizza py-4 shadow-lg mt-2 cursor-pointer">Acessar Sistema</button>
            </form>
            <p id="authErro" class="text-red-500 text-xs font-bold mt-4 hidden bg-red-50 py-2 px-3 rounded-xl border border-red-100 animate-pulse">Dados Incorretos.</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let carrinho = []; let audioTocado = false;
        const urlParams = new URLSearchParams(window.location.search);
        const numeroMesa = urlParams.get('mesa');

        if (numeroMesa) { const navSub = document.getElementById('nav-subtitle'); navSub.innerHTML = `<span class="bg-[#f59e0b] text-gray-900 text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-widest shadow-md flex items-center justify-center gap-1.5 w-max mx-auto"><i data-lucide="utensils" class="w-3 h-3"></i> MESA ${numeroMesa}</span>`; }
        function formatarMoeda(valor) { return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        function toggleCarrinho() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }
        function abrirCheckout() { if (carrinho.length === 0) return; toggleCarrinho(); document.getElementById('checkout-modal').classList.add('open'); if (numeroMesa) { document.getElementById('delivery-fields').classList.add('hidden'); document.getElementById('mesa-fields').classList.remove('hidden'); document.getElementById('mesa-numero-display').innerText = 'MESA ' + numeroMesa; document.getElementById('cliEnd').removeAttribute('required'); } }
        function fecharCheckout() { document.getElementById('checkout-modal').classList.remove('open'); }

        function abrirModalAdmin() { document.getElementById('authErro').classList.add('hidden'); document.getElementById('formAuthAdmin').reset(); document.getElementById('admin-auth-modal').classList.add('open'); setTimeout(() => document.getElementById('auth-user').focus(), 100); }
        function fecharModalAdmin() { document.getElementById('admin-auth-modal').classList.remove('open'); }

        document.getElementById('formAuthAdmin').addEventListener('submit', function (e) {
            e.preventDefault(); let user = document.getElementById('auth-user').value.trim().toLowerCase(); let pass = document.getElementById('auth-pass').value.trim();
            if (user === 'admin' && pass === '123') { window.location.href = '/admin'; } else { document.getElementById('authErro').classList.remove('hidden'); const modal = document.querySelector('#admin-auth-modal > div'); modal.style.transform = "translateX(-10px)"; setTimeout(() => modal.style.transform = "translateX(10px)", 50); setTimeout(() => modal.style.transform = "translateX(0)", 100); }
        });

        // TROCA DINÂMICA DE PREÇO NA TELA
        window.atualizarPrecoDisplay = function (id) {
            const select = document.getElementById(`size-${id}`);
            if (select && select.value.includes('|')) {
                const price = parseFloat(select.value.split('|')[1]);
                document.getElementById(`price-display-${id}`).innerText = formatarMoeda(price);
            }
        };

        // CARRINHO COM SUPORTE A TAMANHOS DIVERSOS
        function adicionarAoCarrinho(id, nomeBase, precoFallback, stock, isPizza) {
            let precoFinal = precoFallback;
            let nomeFinal = nomeBase;

            if (isPizza) {
                const select = document.getElementById(`size-${id}`);
                if (select) {
                    if (select.value.includes('|')) {
                        const parts = select.value.split('|');
                        nomeFinal = `${nomeBase} - ${parts[0]}`;
                        precoFinal = parseFloat(parts[1]);
                    } else {
                        nomeFinal = `${nomeBase} - ${select.value}`;
                    }
                }
            }

            const item = carrinho.find(i => i.id === id && i.nome === nomeFinal);
            if (item) {
                if (item.qtde >= stock) return alert("Estoque insuficiente!");
                item.qtde += 1;
            } else {
                if (stock <= 0) return alert("Esgotado.");
                carrinho.push({ id, nome: nomeFinal, preco: precoFinal, qtde: 1, maxStock: stock });
            }
            atualizarCarrinhoUI();
        }

        function alterarQuantidade(index, delta) { const item = carrinho[index]; if (delta > 0 && item.qtde >= item.maxStock) return; item.qtde += delta; if (item.qtde <= 0) carrinho.splice(index, 1); atualizarCarrinhoUI(); }

        function atualizarCarrinhoUI() {
            const container = document.getElementById('cart-items');
            const qtdeTotal = carrinho.reduce((acc, item) => acc + item.qtde, 0);
            const valorTotal = carrinho.reduce((acc, item) => acc + (item.preco * item.qtde), 0);
            const btnFloat = document.getElementById('btn-carrinho');

            if (qtdeTotal > 0) btnFloat.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-10');
            else btnFloat.classList.add('opacity-0', 'pointer-events-none', 'translate-y-10');

            document.getElementById('cart-badge').innerText = qtdeTotal;
            document.getElementById('floating-total').innerText = formatarMoeda(valorTotal);
            document.getElementById('cart-total').innerText = formatarMoeda(valorTotal);

            if (carrinho.length === 0) { container.innerHTML = '<div class="text-center py-10 opacity-40"><i data-lucide="pizza" class="w-12 h-12 mx-auto mb-3 text-gray-500"></i><p class="font-bold uppercase tracking-widest text-xs">Sua caixa está vazia.</p></div>'; lucide.createIcons(); return; }

            container.innerHTML = carrinho.map((item, index) => `
                    <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex justify-between items-center">
                        <div class="flex-1 pr-3">
                            <h4 class="font-bold text-sm text-gray-900 uppercase">${item.nome}</h4>
                            <span class="text-red-600 font-bold text-sm block mt-0.5">${formatarMoeda(item.preco * item.qtde)}</span>
                        </div>
                        <div class="flex items-center gap-3 bg-gray-50 border border-gray-100 rounded-xl p-1">
                            <button onclick="alterarQuantidade(${index}, -1)" class="w-8 h-8 flex items-center justify-center font-bold text-gray-500 hover:bg-white rounded-lg transition-colors cursor-pointer">-</button>
                            <span class="font-black text-sm w-4 text-center text-gray-900">${item.qtde}</span>
                            <button onclick="alterarQuantidade(${index}, 1)" class="w-8 h-8 flex items-center justify-center font-bold text-gray-500 hover:bg-white rounded-lg transition-colors cursor-pointer">+</button>
                        </div>
                    </div>
                `).join('');
        }

        document.getElementById('formCheckout').onsubmit = async (e) => {
            e.preventDefault(); const btn = e.target.querySelector('button'); btn.innerHTML = "AQUECENDO FORNO..."; btn.disabled = true;
            const valTotal = carrinho.reduce((acc, item) => acc + (item.preco * item.qtde), 0);
            const obs = document.getElementById('cliObs').value.trim();
            let det = carrinho.map(i => `${i.qtde}x ${i.nome}`).join(' | ');
            if (obs) det += ` | ⚠️ OBS: ${obs}`;

            const pedido = { totalAmount: valTotal, orderType: numeroMesa ? "Local" : "Delivery", status: "Pendente", customerName: document.getElementById('cliNome').value, customerPhone: document.getElementById('cliFone').value, customerAddress: numeroMesa ? `Mesa ${numeroMesa}` : document.getElementById('cliEnd').value, orderDetails: det };
            try { await fetch('/api/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(pedido) }); alert("🍕 Pedido na agulha! Acompanhe o status pelo WhatsApp."); window.location.reload(); } catch (erro) { alert("Erro de conexão."); btn.innerHTML = "TENTAR NOVAMENTE"; btn.disabled = false; }
        };

        async function carregarCardapio() {
            const vitrine = document.getElementById('vitrine-categorias'); const menuNav = document.getElementById('menu-categorias');
            try {
                const res = await fetch('/api/products'); const prods = await res.json();
                if (prods.length === 0) { vitrine.innerHTML = '<p class="text-center py-10 font-bold text-gray-400 uppercase tracking-widest">Forno Desligado Hoje.</p>'; return; }
                document.body.addEventListener('click', () => { if (!audioTocado && prods.some(p => p.stockQuantity > 0 && p.stockQuantity <= 5)) { document.getElementById('somEstoqueBaixo').play().catch(() => { }); audioTocado = true; } }, { once: true });

                const agrupados = prods.reduce((acc, p) => { const cat = p.category?.name || 'Geral'; if (!acc[cat]) acc[cat] = []; acc[cat].push(p); return acc; }, {});
                let vitrineHTML = ""; let menuHTML = "";

                Object.keys(agrupados).forEach(cat => {
                    const idCat = cat.replace(/\s+/g, '-').toLowerCase();
                    const isPizza = cat.toLowerCase().includes('pizza');

                    menuHTML += `<a href="#${idCat}" class="bg-gray-800 text-white hover:bg-red-600 border border-gray-700 px-5 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest transition-colors whitespace-nowrap">${cat}</a>`;
                    vitrineHTML += `<div id="${idCat}" class="pt-8 pb-4 scroll-mt-24"><h3 class="text-2xl font-oswald font-bold text-gray-900 mb-5 uppercase tracking-wide flex items-center gap-2"><i data-lucide="utensils-crossed" class="text-red-500 w-5 h-5"></i> ${cat}</h3><div class="space-y-6">`;

                    agrupados[cat].forEach(p => {
                        const foto = p.photoUrl && p.photoUrl.startsWith("data:image") ? `<img src="${p.photoUrl}" class="w-full h-48 object-cover rounded-t-2xl">` : `<div class="w-full h-40 flex items-center justify-center text-6xl bg-gray-200 rounded-t-2xl">🍕</div>`;
                        const esgotado = p.stockQuantity <= 0; const estoqueBaixo = p.stockQuantity > 0 && p.stockQuantity <= 5;
                        const tagEstoqueBaixo = estoqueBaixo ? `<div class="absolute top-3 left-3 bg-red-600 text-white text-[10px] font-black px-3 py-1.5 rounded-lg uppercase tracking-widest shadow-lg flex items-center gap-1.5 border border-white/20 z-10 animate-pulse"><i data-lucide="flame" class="w-3 h-3"></i> Últimas ${p.stockQuantity}</div>` : '';

                        // Extrai a descrição real e os preços se for pizza
                        let descReal = p.description || '';
                        let pricesObj = null;
                        if (descReal.includes('@@@')) {
                            const pts = descReal.split('@@@');
                            descReal = pts[0];
                            try { pricesObj = JSON.parse(pts[1]); } catch (e) { }
                        }

                        let initialPrice = p.price;
                        let seletorTamanho = '';

                        if (isPizza && pricesObj) {
                            initialPrice = pricesObj.G; // Exibe o valor da Grande por padrão
                            seletorTamanho = `
                                    <div class="mb-4">
                                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Tamanho da Pizza</label>
                                        <select id="size-${p.id}" onchange="atualizarPrecoDisplay(${p.id})" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-xs font-bold rounded-xl focus:border-red-500 block p-3 uppercase tracking-wider outline-none cursor-pointer transition-colors">
                                            <option value="Média (6 Fatias)|${pricesObj.M}">Média (6 Fatias) - ${formatarMoeda(pricesObj.M)}</option>
                                            <option value="Grande (8 Fatias)|${pricesObj.G}" selected>Grande (8 Fatias) - ${formatarMoeda(pricesObj.G)}</option>
                                            <option value="Família (12 Fatias)|${pricesObj.F}">Família (12 Fatias) - ${formatarMoeda(pricesObj.F)}</option>
                                        </select>
                                    </div>`;
                        }

                        const actionBtn = esgotado
                            ? `<button disabled class="w-full bg-gray-200 text-gray-400 font-bold py-3.5 rounded-xl text-xs uppercase tracking-widest">Esgotado</button>`
                            : `<button onclick="adicionarAoCarrinho(${p.id}, '${p.name}', ${initialPrice}, ${p.stockQuantity}, ${isPizza ? 'true' : 'false'})" class="w-full btn-pizza py-4 text-xs shadow-md flex justify-center items-center gap-2 cursor-pointer">Adicionar</button>`;

                        vitrineHTML += `
                                <div class="card-pizza flex flex-col relative ${esgotado ? 'opacity-60 grayscale' : ''}">
                                    <div class="relative w-full">${tagEstoqueBaixo}${foto}</div>
                                    <div class="p-5">
                                        <div class="flex justify-between items-start mb-2 gap-2">
                                            <h4 class="font-oswald font-bold text-xl text-gray-900 uppercase leading-none mt-1">${p.name}</h4>
                                            <span id="price-display-${p.id}" class="font-black text-xl text-red-600">${formatarMoeda(initialPrice)}</span>
                                        </div>
                                        <p class="text-[12px] text-gray-500 font-medium mb-5 line-clamp-2 leading-relaxed">${descReal}</p>
                                        <div class="mt-auto">
                                            ${seletorTamanho}
                                            ${actionBtn}
                                        </div>
                                    </div>
                                </div>`;
                    });
                    vitrineHTML += `</div></div>`;
                });
                vitrine.innerHTML = vitrineHTML; menuNav.innerHTML = menuHTML; lucide.createIcons();
            } catch (e) { vitrine.innerHTML = '<p class="text-center text-red-500 py-10 font-bold uppercase">Erro ao carregar o menu.</p>'; }
        }

        carregarCardapio();
    </script>
</body>
</html>
